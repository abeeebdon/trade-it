name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

      - name: Push to deploy branch
        if: github.event_name == 'push'
        run: |
          cd deploy
          git init
          git checkout -b deploy
          git add -A
          git -c user.name=ci -c user.email=ci@ci commit -m "Build $(date)"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/abeeebdon/trade-it.git deploy:deploy
