name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Prepare deploy branch
        if: github.event_name == 'push'
        run: |
          git fetch origin deploy || true
          git worktree add deploy-out origin/deploy || git worktree add deploy-out --orphan deploy
          cp -r .next deploy-out/
          cp -r public deploy-out/
          cp package.json deploy-out/
          cp package-lock.json deploy-out/
      - name: Push to deploy branch
        if: github.event_name == 'push'
        run: |
          cd deploy-out
          git add -A
          git -c user.name=ci -c user.email=ci@ci commit -m "Build $(date)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/abeeebdon/trade-it.git HEAD:deploy
