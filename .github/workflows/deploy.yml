name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Prepare deploy branch
        if: github.event_name == 'push'
        run: |
          mkdir deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
      - name: Push to deploy branch
        if: github.event_name == 'push'
        run: |
          cd deploy
          git init
          git checkout -b deploy
          git add -A
          git -c user.name=ci -c user.email=ci@ci commit -m "Build $(date)"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yourname/yourrepo.git deploy:deploy
